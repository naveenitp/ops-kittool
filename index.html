<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>STB Utility Toolkit</title>
<link rel="icon" href="favicon.ico">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

.light{
background:#f4f6fb;
color:#111;
}

.sidebar{
width:250px;
background:#111827;
padding:20px;
display:flex;
flex-direction:column;
}

.sidebar h2{
margin-bottom:20px;
}

.sidebar button{
margin:5px 0;
padding:10px;
background:#1f2937;
border:none;
color:white;
cursor:pointer;
border-radius:6px;
}

.sidebar button:hover{
background:#374151;
}

.sidebar-footer{
margin-top:auto;
text-align:center;
font-size:13px;
opacity:0.7;
}

.main{
flex:1;
padding:30px;
overflow:auto;
}

.module{
display:none;
}

textarea{
width:100%;
height:150px;
background:#020617;
color:#fff;
border:1px solid #334155;
padding:10px;
border-radius:6px;
}

.light textarea{
background:white;
color:black;
}

button.action{
margin-top:10px;
padding:10px 16px;
background:#2563eb;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

button.action:hover{
background:#1d4ed8;
}

.card{
background:#020617;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.light .card{
background:white;
}

.clock{
font-size:20px;
text-align:center;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>STB Toolkit</h2>

<button onclick="showModule('dashboard')">Dashboard</button>
<button onclick="showModule('comma')">Comma Formatter</button>
<button onclick="showModule('quote')">Quote Formatter</button>
<button onclick="showModule('duplicate')">Duplicate Counter</button>
<button onclick="showModule('distinct')">Distinct Extractor</button>
<button onclick="showModule('untrash')">Untrash STB SQL</button>
<button onclick="showModule('cardless')">Card → Cardless Conversion</button>
<button onclick="showModule('employee')">Employee Filter Generator</button>
<button onclick="showModule('append')">SQL Append Generator</button>

<button onclick="toggleTheme()">Toggle Theme</button>

<div class="sidebar-footer">
<div id="date"></div>
<div id="time"></div>
</div>

</div>

<div class="main">

<!-- Dashboard -->

<div id="dashboard" class="module">

<div class="card clock">
<div id="dashDate"></div>
<div id="dashTime"></div>
</div>

<div class="card">
<h3>Recent Operations</h3>
<ul id="recentOps"></ul>
</div>

</div>

<!-- Comma Formatter -->

<div id="comma" class="module">

<h2>Comma Formatter</h2>

<textarea id="commaInput"></textarea>

<button class="action" onclick="formatComma()">Format</button>

<textarea id="commaOutput"></textarea>

</div>

<!-- Quote Formatter -->

<div id="quote" class="module">

<h2>Quote Formatter</h2>

<textarea id="quoteInput"></textarea>

<button class="action" onclick="formatQuote()">Convert</button>

<textarea id="quoteOutput"></textarea>

</div>

<!-- Duplicate Counter -->

<div id="duplicate" class="module">

<h2>Duplicate Counter</h2>

<textarea id="dupInput"></textarea>

<button class="action" onclick="countDuplicates()">Check</button>

<textarea id="dupOutput"></textarea>

</div>

<!-- Distinct Extractor -->

<div id="distinct" class="module">

<h2>Distinct Extractor</h2>

<textarea id="distinctInput"></textarea>

<button class="action" onclick="extractDistinct()">Extract</button>

<textarea id="distinctOutput"></textarea>

</div>

<!-- Untrash -->

<div id="untrash" class="module">

<h2>Untrash STB SQL Generator</h2>

<textarea id="serialInput" placeholder="Paste Serial Numbers"></textarea>

<button class="action" onclick="generateSerialSQL()">Generate Serial SQL</button>

<textarea id="serialSQL"></textarea>

<textarea id="stockInput" placeholder="Paste Stock IDs"></textarea>

<button class="action" onclick="generateStockSQL()">Generate Stock SQL</button>

<textarea id="stockSQL"></textarea>

</div>

<!-- Cardless -->

<div id="cardless" class="module">

<h2>Card → Cardless Box Conversion</h2>

<textarea placeholder="Paste serial numbers"></textarea>

<button class="action">Generate</button>

</div>

<!-- Employee -->

<div id="employee" class="module">

<h2>Employee Filter Generator</h2>

<textarea id="empInput"></textarea>

<button class="action" onclick="generateEmployee()">Generate</button>

<textarea id="empIDs"></textarea>

<textarea id="empCodes"></textarea>

</div>

<!-- Append -->

<div id="append" class="module">

<h2>SQL Append Generator</h2>

<textarea id="appendSerial"></textarea>

<textarea id="appendStock"></textarea>

<button class="action" onclick="generateAppendSQL()">Generate SQL</button>

<textarea id="appendOutput"></textarea>

</div>

</div>

<script>

function showModule(id){

document.querySelectorAll(".module").forEach(m=>m.style.display="none");

document.getElementById(id).style.display="block";

addRecent(id);

}

showModule("dashboard");

function toggleTheme(){

document.body.classList.toggle("light");

}

function updateClock(){

let now=new Date();

document.getElementById("date").innerText=now.toDateString();

document.getElementById("time").innerText=now.toLocaleTimeString();

document.getElementById("dashDate").innerText=now.toDateString();

document.getElementById("dashTime").innerText=now.toLocaleTimeString();

}

setInterval(updateClock,1000);

updateClock();

function formatComma(){

let input=document.getElementById("commaInput").value;

input=input.replace(/\|/g," ");

let arr=input.split(/[\s,\n]+/).filter(v=>v!="");

document.getElementById("commaOutput").value=arr.join(",");

}

function formatQuote(){

let input=document.getElementById("quoteInput").value;

let arr=input.split(/[\s,\n,]+/).filter(v=>v!="");

let result=arr.map(v=>"'"+v+"'");

document.getElementById("quoteOutput").value=result.join(",");

}

function countDuplicates(){

let input=document.getElementById("dupInput").value.split(/[\n,]+/);

let map={};

input.forEach(v=>{

v=v.trim();

if(v!=""){

map[v]=(map[v]||0)+1;

}

});

let output="";

for(let k in map){

if(map[k]>1){

output+=k+" = "+map[k]+"\n";

}

}

document.getElementById("dupOutput").value=output;

}

function extractDistinct(){

let input=document.getElementById("distinctInput").value.split(/[\n,]+/);

let set=[...new Set(input.map(v=>v.trim()).filter(v=>v!=""))];

document.getElementById("distinctOutput").value=set.join(",");

}

function generateSerialSQL(){

let input=document.getElementById("serialInput").value;

let arr=input.split(/[\n,]+/).map(v=>v.trim()).filter(v=>v!="");

let quoted=arr.map(v=>"'"+v+"'");

let sql="select stock_id, serial_number, vc_number, is_trash, trashed_date from eb_stock where serial_number in ("+quoted.join(",")+");";

document.getElementById("serialSQL").value=sql;

}

function generateStockSQL(){

let input=document.getElementById("stockInput").value;

let arr=input.split(/[\n,]+/).map(v=>v.trim()).filter(v=>v!="");

let sql="update eb_stock set is_trash = 0 where stock_id in ("+arr.join(",")+");";

document.getElementById("stockSQL").value=sql;

}

function generateEmployee(){

let lines=document.getElementById("empInput").value.split("\n");

let ids=[];

let codes=[];

lines.forEach(line=>{

let m=line.match(/\|\s*(\d+)\s*\|\s*([^\|]*)/);

if(m){

let id=m[1];

let code=m[2].trim();

if(code!=""){

ids.push(id);

codes.push("'"+code.replace("#","").toLowerCase().substring(0,3)+"'");

}

}

});

document.getElementById("empIDs").value=ids.join(",");

document.getElementById("empCodes").value=[...new Set(codes)].join(",");

}

function generateAppendSQL(){

let serial=document.getElementById("appendSerial").value.split(/[\n,]+/).map(v=>"'"+v.trim()+"'");

let stock=document.getElementById("appendStock").value.split(/[\n,]+/).map(v=>v.trim());

let sql="select stock_id, serial_number, vc_number from eb_stock where serial_number in ("+serial.join(",")+") or stock_id in ("+stock.join(",")+");";

document.getElementById("appendOutput").value=sql;

}

let recent=[];

function addRecent(op){

recent.unshift(op);

recent=recent.slice(0,5);

let list=document.getElementById("recentOps");

list.innerHTML="";

recent.forEach(r=>{

let li=document.createElement("li");

li.innerText=r;

list.appendChild(li);

});

}

</script>

</body>
</html>
