```html
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>STB SQL Utility Toolkit</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Segoe UI,Arial;
}

body{
display:flex;
height:100vh;
background:#0f172a;
color:#fff;
}

body.light{
background:#f3f4f6;
color:#111;
}

.sidebar{
width:250px;
background:#020617;
padding:20px;
display:flex;
flex-direction:column;
}

.sidebar h2{
margin-bottom:20px;
}

.sidebar button{
padding:10px;
margin-bottom:8px;
border:none;
background:#1e293b;
color:#fff;
cursor:pointer;
border-radius:6px;
text-align:left;
}

.sidebar button:hover{
background:#334155;
}

.sidebar-footer{
margin-top:auto;
font-size:13px;
opacity:0.7;
}

.main{
flex:1;
padding:30px;
overflow:auto;
}

.module{
display:none;
}

textarea{
width:100%;
height:140px;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #334155;
background:#020617;
color:white;
}

body.light textarea{
background:white;
color:black;
}

button.action{
margin-top:10px;
padding:10px 16px;
background:#2563eb;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.card{
background:#020617;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

body.light .card{
background:white;
}

.clock{
font-size:20px;
text-align:center;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>SQL Toolkit</h2>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('comma')">Comma Formatter</button>
<button onclick="show('quote')">Quote Formatter</button>
<button onclick="show('distinct')">Distinct Extractor</button>
<button onclick="show('employee')">Employee Filter</button>
<button onclick="show('cardless')">Card → Cardless</button>

<button onclick="toggleTheme()">Toggle Theme</button>

<div class="sidebar-footer">
<div id="date"></div>
<div id="time"></div>
</div>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="module">

<div class="card clock">
<div id="dashDate"></div>
<div id="dashTime"></div>
</div>

<div class="card">
<h3>Welcome</h3>
<p>Internal SQL Utility Toolkit</p>
</div>

</div>

<!-- COMMA FORMATTER -->

<div id="comma" class="module">

<h2>Comma Formatter</h2>

<textarea id="commaInput" placeholder="Paste numbers or table output"></textarea>

<button class="action" onclick="formatComma()">Generate</button>

<textarea id="commaOutput"></textarea>

</div>

<!-- QUOTE FORMATTER -->

<div id="quote" class="module">

<h2>Quote Formatter</h2>

<textarea id="quoteInput"></textarea>

<button class="action" onclick="formatQuote()">Convert</button>

<textarea id="quoteOutput"></textarea>

</div>

<!-- DISTINCT -->

<div id="distinct" class="module">

<h2>Distinct Extractor</h2>

<textarea id="distinctInput"></textarea>

<button class="action" onclick="extractDistinct()">Extract</button>

<textarea id="distinctOutput"></textarea>

</div>

<!-- EMPLOYEE FILTER -->

<div id="employee" class="module">

<h2>Employee Filter Generator</h2>

<textarea id="empInput"></textarea>

<button class="action" onclick="generateEmployee()">Generate</button>

<textarea id="empIDs" placeholder="Employee IDs"></textarea>

<textarea id="empCodes" placeholder="Codes"></textarea>

</div>

<!-- CARDLESS -->

<div id="cardless" class="module">

<h2>Card → Cardless Conversion</h2>

<textarea id="cardlessInput"></textarea>

<button class="action" onclick="generateCardless()">Generate SQL</button>

<textarea id="cardlessOutput"></textarea>

</div>

</div>

<script>

function show(id){

document.querySelectorAll(".module").forEach(m=>m.style.display="none");

document.getElementById(id).style.display="block";

}

show("dashboard");

function toggleTheme(){

document.body.classList.toggle("light");

}

function updateClock(){

let now=new Date();

document.getElementById("date").innerText=now.toDateString();
document.getElementById("time").innerText=now.toLocaleTimeString();

document.getElementById("dashDate").innerText=now.toDateString();
document.getElementById("dashTime").innerText=now.toLocaleTimeString();

}

setInterval(updateClock,1000);

updateClock();

/* COMMA FORMAT */

function formatComma(){

let input=document.getElementById("commaInput").value;

input=input.replace(/\|/g,'');

let arr=input.split(/[\s,\n,]+/).filter(v=>v!="");

document.getElementById("commaOutput").value=arr.join(",");

}

/* QUOTE FORMAT */

function formatQuote(){

let input=document.getElementById("quoteInput").value;

let arr=input.split(/[\s,\n,]+/).filter(v=>v!="");

let out=arr.map(v=>"'"+v+"'");

document.getElementById("quoteOutput").value=out.join(",");

}

/* DISTINCT */

function extractDistinct(){

let input=document.getElementById("distinctInput").value.split(/[\n,]+/);

let unique=[...new Set(input.map(v=>v.trim()).filter(v=>v!=""))];

document.getElementById("distinctOutput").value=unique.join(",");

}

/* EMPLOYEE FILTER */

function generateEmployee(){

let lines=document.getElementById("empInput").value.split("\n");

let ids=[];
let codes=[];

lines.forEach(line=>{

line=line.replace(/\|/g," ").trim();

let p=line.split(/\s+/);

if(p.length>=2){

let id=p[0];
let code=p[1];

if(!isNaN(id)&&code!=""){

ids.push(id);

let clean=code.replace("#","").toLowerCase().substring(0,3);

codes.push("'"+clean+"'");

}

}

});

codes=[...new Set(codes)];

document.getElementById("empIDs").value=ids.join(",");
document.getElementById("empCodes").value=codes.join(",");

}

/* CARDLESS */

function generateCardless(){

let input=document.getElementById("cardlessInput").value;

input=input.replace(/\|/g,'');

let arr=input.split(/[\s,\n,]+/).filter(v=>v!="");

let quoted=arr.map(v=>"'"+v+"'");

let sql="UPDATE eb_stock SET is_cardless=1 WHERE serial_number IN ("+quoted.join(",")+");";

document.getElementById("cardlessOutput").value=sql;

}

</script>

</body>
</html>
